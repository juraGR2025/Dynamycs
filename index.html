<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Динамика расчётов</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./js/main.js"></script>
</head>
<body>
<div class="header">
    <img src="./source/Logo-1.png" alt="Логотип" class="logo">
    <div class="header-text">
        <h1>ВОЕННО-КОСМИЧЕСКАЯ АКАДЕМИЯ ИМЕНИ А.Ф.МОЖАЙСКОГО</h1>
        <h3>Лабораторная работа "Исследование параметров динамики груза на крюке"</h3>
    </div>
</div>

<!-- Первая часть: ввод данных учащегося -->
<div class="user-info">
    <h2>1. Ваши данные</h2>
    <form id="userForm">
        <label for="cadetName">ФИО:</label>
        <input type="text" id="cadetName" class="person-input" name="fullName" required>
        <div id="Name"></div>

        <label for="groupNumber">Номер учебной группы:</label>
        <input type="number" id="groupNumber" class="person-input" name="groupNumber" required>
        <div id="groupN"></div>
        <br />
        <button type="submit" id="fio-write">Принять</button>
    </form>
</div>

<!-- Вторая часть: тестовые вопросы -->
<div class="test-section hidden">
    <h2 class="section-header">2. Выполните тест</h2>
    <div id="quiz-container"></div> <!-- Контейнер для вопросов -->
</div>

<!-- Третья часть: управление мостовым краном -->
<div class="animation-block">
    <h3 class="section-header">3. Переместите груз мостовым краном</h3>
    <div class="pult-container">
        <!-- Красная кнопка Стоп -->
        <button id="stopButton">Стоп</button>

        <!-- Верхняя группа кнопок -->
        <div class="direction-buttons-up">
            <button class="dir-btn up"><span>⬆️</span></button>
            <button class="dir-btn down"><span>⬇️</span></button>
            <button class="dir-btn left"><span>⬅️</span></button>
            <button class="dir-btn right"><span>➡️</span></button>
            <button class="dir-btn forward"><span>↗️</span></button>
            <button class="dir-btn backward"><span>↙️</span></button>
        </div>

        <!-- Лампочка-индикатор -->
        <div class="power-indicator"></div>
    </div>
</div>

<!-- Четвертая часть: графики горизонтальных и вертикальных колебаний -->
<div class="chart-block">
    <h2 class="section-header">4. Графики колебаний</h2>
    <div class="graph-container">
        <div class="row">
            <canvas id="graph1" class="canvas"></canvas>
            <canvas id="graph2" class="canvas"></canvas>
        </div>
        <div class="row">
            <canvas id="graph3" class="canvas"></canvas>
            <canvas id="graph4" class="canvas"></canvas>
        </div>
        <div class="row">
            <canvas id="graph5" class="canvas"></canvas>
            <canvas id="graph6" class="canvas"></canvas>
        </div>
    </div>
    <button type="submit" id="chart-builder">Построить графики</button>
</div>

<!-- Пятая часть: выводы по работе -->
<div class="test-section">
    <div class="question">
        <h2>5. Выводы по работе:</h2>
        <textarea id="comments" name="comments" placeholder="Введите ваш вывод здесь"></textarea>
    </div>
    <div id="txt-finding"></div>
    <button type="submit" id="finding-write">Завершить работу</button>
</div>

<footer>© Copyright 2026</footer>
</body>
</html>
